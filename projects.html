<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AdrianseGroup portfolio — explore our interior design and architecture projects across Beijing, Hong Kong, Shanghai, and Wuhan.">
  <title>Projects | AdrianseGroup</title>
  <link rel="icon" type="image/x-icon" href="assets/icons/AdrianseLogo.ico">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" role="navigation" aria-label="Main navigation">
    <div class="container">
      <a href="index.html" class="navbar__logo" aria-label="AdrianseGroup Home">
        <img src="assets/images/AdrianseLogo.png" alt="AdrianseGroup logo">
        <span class="navbar__brand">AdrianseGroup</span>
      </a>
      <button class="navbar__toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <ul class="navbar__links">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html" class="active">Projects</a></li>
        <li><a href="about.html">About Us</a></li>
      </ul>
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero hero--page">
    <div class="hero__bg" style="background-image: url('assets/images/projects/Dell EMC, Beijing/dell_03.jpg');" role="img" aria-label="AdrianseGroup projects showcase"></div>
    <div class="hero__content">
      <h1 class="hero__page-title">Our Projects</h1>
    </div>
  </header>

  <!-- FILTER + GRID -->
  <section class="section">
    <div class="container">
      <div class="filter-bar" role="group" aria-label="Filter projects by location">
        <button class="filter-btn active" data-filter="All">All</button>
        <button class="filter-btn" data-filter="Beijing">Beijing</button>
        <button class="filter-btn" data-filter="Hong Kong">Hong Kong</button>
        <button class="filter-btn" data-filter="Shanghai">Shanghai</button>
        <button class="filter-btn" data-filter="Wuhan">Wuhan</button>
      </div>

      <div class="project-grid" role="list">
        <!-- Populated by main.js -->
      </div>
    </div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" role="dialog" aria-label="Image lightbox" aria-hidden="true">
    <span class="lightbox__counter"></span>
    <button class="lightbox__close" aria-label="Close lightbox"></button>
    <button class="lightbox__nav lightbox__nav--prev" aria-label="Previous image"></button>
    <button class="lightbox__nav lightbox__nav--next" aria-label="Next image"></button>
    <img class="lightbox__img" src="" alt="">
    <div class="lightbox__caption"></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2026 <span>AdrianseGroup</span>. All rights reserved.</p>
    </div>
  </footer>

  <script src="assets/js/main.js"></script>
</body>
</html>
